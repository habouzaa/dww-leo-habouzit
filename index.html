<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sneakers Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <nav>
            <a href="#" onclick="fermerDetail()">HOME</a>
            <a href="#">PRICER</a>
            <a href="#">CART</a>
            <a href="#">ACCOUNT</a>
        </nav>
    </header>

    <div id="page-accueil">
        <section class="hero-section">
            <img src="sneaker-hero.png" alt="Hero" class="hero-image">
            <h2>OUR PRODUCTS</h2>
            <div class="arrows">▼<br>▼</div>
        </section>

        <nav class="filters">
            <div class="filter-item">BRANDS <span>▼</span></div>
            <div class="filter-item">SIZES <span>▼</span></div>
            <div class="filter-item">PRICE <span>▼</span></div>
            <div class="filter-item">GENDER <span>▼</span></div>
        </nav>

        <main class="product-list" id="conteneur-liste"></main>
    </div>

    <div id="page-detail" style="display: none;">
        <main class="product-detail-container">
            <div class="product-detail-content">
                
                <button class="btn-back" onclick="fermerDetail()">← Retour</button>
                
                <div class="image-showcase">
                    <img id="detail-image" src="" alt="Sneaker en grand">
                </div>

                <div class="purchase-section">
                    <h2 id="detail-titre">Titre</h2>
                    <p id="detail-marque" class="brand">Marque</p>
                    <p id="detail-desc" class="quote">"Desc"</p>

                    <div class="size-selector">
                        <button class="size-btn selected">36</button>
                        <button class="size-btn">37</button>
                        <button class="size-btn disabled">38</button>
                        <button class="size-btn">39</button>
                        <button class="size-btn disabled">40</button>
                        <button class="size-btn disabled">41</button>
                        <button class="size-btn">42</button>
                    </div>

                    <button class="btn-buy" style="margin-top: 20px;">ADD TO CART</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
