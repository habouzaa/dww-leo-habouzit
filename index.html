<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Titre de la page -->
    <title>Sneakers Shop - Accueil</title>

    <!-- Lien vers le  CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Contient la barre de navigation  -->
    <header class="main-header">
        <nav>
            <!-- Liens vers différentes sections  -->
            <a href="#">HOME</a>
            <a href="#">PRICER</a>
            <a href="#">CART</a>
            <a href="#">ACCOUNT</a>
        </nav>
    </header>

    <!-- 
    Ce que ça fait :
    Affiche un menu en haut du site pour naviguer entre les pages-->

 
    <!-- Section  visible en premier -->
    <section class="hero-section">

        <!-- Image principale -->
        <img src="sneaker-hero.png" alt="Adidas Forum Low OG" class="hero-image">

        <!-- Titre de la section -->
        <h2>OUR PRODUCTS</h2>

        <!-- Indicateur -->
        <div class="arrows">▼<br>▼</div>
    </section>

    <!-- 
    Ce que ça fait :
    Met en avant un visuel principal et incite l'utilisateur à scroller.

    PROMPT IA :
    "Crée une section  avec une image principale, un titre centré et une indication visuelle de scroll vers le bas."
    -->


    <!-- Barre de filtres -->
    <nav class="filters">

        <!-- Chaque filtre correspond à une catégorie -->
        <div class="filter-item">BRANDS <span>▼</span></div>
        <div class="filter-item">SIZES <span>▼</span></div>
        <div class="filter-item">PRICE <span>▼</span></div>
        <div class="filter-item">GENDER <span>▼</span></div>

    </nav>

    <!-- 
    Ce que ça fait :
    Interface de filtres pour trier les produits .

    -->

    <main class="product-list">
            </main>

        <script src="script.js"></script>

    </body>
    </html>


</body>
</html>
